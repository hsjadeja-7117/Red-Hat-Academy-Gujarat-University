<!DOCTYPE html>
<!--
  =============================================================================
  RED HAT ACADEMY - LEADERSHIP & TEAM PAGE
  =============================================================================
  Like index.html, this page is mostly empty placeholder containers.
  script.js's buildTeamPage() function fills the #orgChart container with,
  in top-to-bottom order:
    1. Head of Department card
    2. Supporting Faculty card
    3. Campus Ambassador card (visually highlighted)
    4. Core Team 3-column grid
  All of that content and the photo paths live in data.json's "team" object.
  =============================================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Hat Academy | Leadership &amp; Team</title>
  <meta name="description" content="Meet the Red Hat Academy leadership chain: Head of Department, Supporting Faculty, Campus Ambassador, and the student core team.">

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/redhat-logo.svg">
</head>
<body data-page="team">

  <nav id="navbar" class="navbar" aria-label="Main navigation"></nav>

  <main>
    <section class="section">
      <div class="container">

        <!-- Filled in with the page heading + intro paragraph -->
        <div id="teamHeader" class="team-page-header"></div>

        <!--
          ORG CHART PLACEHOLDER
          ----------------------
          buildTeamPage() in script.js inserts the 4 tiers here, each
          separated by a small vertical line (.org-chart__connector) drawn
          in CSS, so the "chain of leadership" reads clearly top-to-bottom.
        -->
        <div id="orgChart" class="org-chart"></div>

      </div>
    </section>
  </main>

  <footer id="footer" class="site-footer"></footer>

  <script src="js/script.js"></script>
</body>
</html>
