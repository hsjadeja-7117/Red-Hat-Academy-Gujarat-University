<!--
  ORIGINAL HERO ILLUSTRATION
  --------------------------
  A simple, original "server + terminal" scene drawn with basic SVG shapes.
  It is themed around open-source infrastructure (what Red Hat is famous
  for), so it fits the brand without copying any real photo or logo.
  Feel free to replace this with a real photo later -- just point
  data.json's "heroImage" field at your new file.
-->
<svg viewBox="0 0 560 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a server rack and terminal window">
  <rect width="560" height="420" fill="none"/>

  <!-- soft background glow -->
  <circle cx="420" cy="120" r="160" fill="#EE0000" opacity="0.06"/>

  <!-- server rack -->
  <g>
    <rect x="70" y="90" width="180" height="240" rx="10" fill="#1A1A1A"/>
    <rect x="70" y="90" width="180" height="240" rx="10" fill="none" stroke="#EE0000" stroke-width="2"/>
    <!-- rack units -->
    <g fill="#2A2A2A" stroke="#3A3A3A">
      <rect x="88" y="110" width="144" height="34" rx="4"/>
      <rect x="88" y="154" width="144" height="34" rx="4"/>
      <rect x="88" y="198" width="144" height="34" rx="4"/>
      <rect x="88" y="242" width="144" height="34" rx="4"/>
      <rect x="88" y="286" width="144" height="24" rx="4"/>
    </g>
    <!-- little status lights: red = active -->
    <circle cx="102" cy="127" r="4" fill="#EE0000"/>
    <circle cx="102" cy="171" r="4" fill="#EE0000"/>
    <circle cx="102" cy="215" r="4" fill="#4CAF50"/>
    <circle cx="102" cy="259" r="4" fill="#EE0000"/>
  </g>

  <!-- floating terminal window -->
  <g>
    <rect x="230" y="40" width="280" height="190" rx="12" fill="#141414" stroke="#EE0000" stroke-width="2"/>
    <!-- title bar -->
    <rect x="230" y="40" width="280" height="28" rx="12" fill="#EE0000"/>
    <circle cx="248" cy="54" r="5" fill="#1A1A1A"/>
    <circle cx="266" cy="54" r="5" fill="#1A1A1A"/>
    <circle cx="284" cy="54" r="5" fill="#1A1A1A"/>
    <!-- fake terminal text lines -->
    <text x="248" y="96" font-family="monospace" font-size="14" fill="#EE0000">$ whoami</text>
    <text x="248" y="118" font-family="monospace" font-size="14" fill="#FFFFFF">student@redhat-academy</text>
    <text x="248" y="146" font-family="monospace" font-size="14" fill="#EE0000">$ status</text>
    <text x="248" y="168" font-family="monospace" font-size="14" fill="#4CAF50">learning... skilling up... hired.</text>
    <rect x="248" y="182" width="10" height="16" fill="#EE0000"/>
  </g>

  <!-- decorative circuit line -->
  <path d="M50 360 H160 V330 H260" fill="none" stroke="#EE0000" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <circle cx="260" cy="330" r="5" fill="#EE0000" opacity="0.7"/>
</svg>
