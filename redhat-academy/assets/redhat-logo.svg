<!--
  PLACEHOLDER "RED HAT ACADEMY" BADGE
  ------------------------------------
  IMPORTANT: This is an original text-based badge, NOT the official Red Hat
  "Shadowman" logo (that mark is trademarked and we can't ship a copy of it
  for you). Your Academy should have received official logo files from
  Red Hat as part of your partnership -- drop that file in this /assets
  folder, rename it (or update data.json's "redhatLogo" path), and it will
  appear here automatically, no code changes needed.
-->
<svg viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Red Hat Academy logo placeholder">
  <rect x="1" y="1" width="218" height="58" rx="8" fill="#1A1A1A" stroke="#EE0000" stroke-width="2"/>
  <circle cx="30" cy="30" r="14" fill="#EE0000"/>
  <path d="M18 34 Q30 18 42 34" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  <text x="52" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">RED HAT</text>
  <text x="52" y="42" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#EE0000">ACADEMY</text>
</svg>
