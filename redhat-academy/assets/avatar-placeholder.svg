<!--
  PLACEHOLDER PROFILE PHOTO
  --------------------------
  A generic silhouette avatar, reused for every team member so the Team
  page looks finished before real photos are ready. To add a real photo:
    1. Put the photo file inside /assets (e.g. assets/team/priya.jpg)
    2. Update that person's "photo" field in data.json to the new path
  No HTML/CSS/JS changes are needed -- the page reads photo paths from
  data.json and swaps the <img> src automatically.
-->
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Placeholder profile photo">
  <rect width="200" height="200" fill="#1A1A1A"/>
  <circle cx="100" cy="80" r="38" fill="#3A3A3A"/>
  <path d="M30 190 C30 140 170 140 170 190 Z" fill="#3A3A3A"/>
  <rect width="200" height="200" fill="none" stroke="#EE0000" stroke-width="4"/>
</svg>
