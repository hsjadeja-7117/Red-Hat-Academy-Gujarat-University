<!--
  PLACEHOLDER QR "GRAPHIC" (NOT A REAL, SCANNABLE CODE)
  -------------------------------------------------------
  This is just an abstract grid pattern styled to look like a QR code, so
  the Contact page looks complete. It will NOT scan to anything.
  Before you go live:
    1. Create your WhatsApp Community and copy its invite link.
    2. Generate a real QR code for that link (e.g. via a free QR generator).
    3. Save the downloaded image as assets/whatsapp-qr.png (or similar).
    4. Update "whatsappQr" in data.json to point at that new file, and
       update "whatsappLink" to the real invite URL for the button.
-->
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Placeholder QR code graphic">
  <rect width="200" height="200" fill="#FFFFFF"/>
  <rect x="10" y="10" width="200" height="200" fill="none"/>
  <!-- three corner "finder" squares, like a real QR code has -->
  <g fill="#1A1A1A">
    <rect x="15" y="15" width="45" height="45"/>
    <rect x="140" y="15" width="45" height="45"/>
    <rect x="15" y="140" width="45" height="45"/>
  </g>
  <g fill="#FFFFFF">
    <rect x="25" y="25" width="25" height="25"/>
    <rect x="150" y="25" width="25" height="25"/>
    <rect x="25" y="150" width="25" height="25"/>
  </g>
  <g fill="#EE0000">
    <rect x="33" y="33" width="9" height="9"/>
    <rect x="158" y="33" width="9" height="9"/>
    <rect x="33" y="158" width="9" height="9"/>
  </g>
  <!-- random-ish speckle pattern in the middle to suggest QR "noise" -->
  <g fill="#1A1A1A">
    <rect x="80" y="20" width="10" height="10"/>
    <rect x="100" y="30" width="10" height="10"/>
    <rect x="90" y="50" width="10" height="10"/>
    <rect x="70" y="70" width="10" height="10"/>
    <rect x="110" y="80" width="10" height="10"/>
    <rect x="130" y="100" width="10" height="10"/>
    <rect x="60" y="100" width="10" height="10"/>
    <rect x="90" y="110" width="10" height="10"/>
    <rect x="150" y="90" width="10" height="10"/>
    <rect x="70" y="130" width="10" height="10"/>
    <rect x="100" y="150" width="10" height="10"/>
    <rect x="120" y="130" width="10" height="10"/>
    <rect x="140" y="150" width="10" height="10"/>
    <rect x="160" y="120" width="10" height="10"/>
  </g>
</svg>
