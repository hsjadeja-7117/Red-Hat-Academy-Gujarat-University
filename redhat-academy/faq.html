<!DOCTYPE html>
<!--
  =============================================================================
  RED HAT ACADEMY - FAQ PAGE
  =============================================================================
  script.js's buildFaqPage() reads data.json's "faq.items" array (10
  question/answer pairs) and builds one collapsible ".faq-item" per pair
  inside #faqList. setupAccordion() (also in script.js) then adds the
  click-to-expand behavior. See css/style.css section 9 for how the
  open/close animation works (a CSS max-height transition).
  =============================================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Hat Academy | FAQ</title>
  <meta name="description" content="Answers to common questions about Red Hat, the Red Hat Academy program, curriculum, certifications, and how to get involved.">

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/redhat-logo.svg">
</head>
<body data-page="faq">

  <nav id="navbar" class="navbar" aria-label="Main navigation"></nav>

  <main>
    <section class="section">
      <div class="container">

        <!-- Filled in with the page heading + intro paragraph -->
        <div id="faqHeader" class="team-page-header"></div>

        <!--
          ACCORDION LIST PLACEHOLDER
          ----------------------------
          Each question becomes a <button> (buttons are used instead of a
          plain <div> because buttons are automatically keyboard-focusable
          and clickable with Enter/Space - free accessibility). Clicking a
          question toggles that item's "is-open" class.
        -->
        <div id="faqList" class="faq-list"></div>

      </div>
    </section>
  </main>

  <footer id="footer" class="site-footer"></footer>

  <script src="js/script.js"></script>
</body>
</html>
